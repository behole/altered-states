<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Salvia - The Doorway</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <style>body{margin:0;overflow:hidden;background:#000;display:flex;justify-content:center;align-items:center;height:100vh;}</style>
</head>
<body>
<script>
let glitchSlices = [];
let foldLines = [];
let shardQueue = [];

function setup() {
  createCanvas(800, 800);
  colorMode(HSB, 360, 100, 100, 100);
  rectMode(CORNER);
}

function draw() {
  background(0, 0, 3);

  let t = frameCount * 0.015;

  // Base "reality" - a perspective grid being torn
  push();
  translate(width / 2, height / 2);

  // Perspective grid with distortion
  let gridAlpha = 20 + sin(t * 3) * 10;
  stroke(0, 0, 40, gridAlpha);
  strokeWeight(0.5);

  // Vertical grid lines that warp
  for (let x = -400; x <= 400; x += 40) {
    beginShape();
    noFill();
    for (let y = -400; y <= 400; y += 10) {
      let warp = sin(y * 0.01 + t * 2 + x * 0.005) * (30 + sin(t * 5) * 15);
      vertex(x + warp, y);
    }
    endShape();
  }

  // Horizontal grid lines that warp
  for (let y = -400; y <= 400; y += 40) {
    beginShape();
    noFill();
    for (let x = -400; x <= 400; x += 10) {
      let warp = sin(x * 0.01 + t * 2.5 + y * 0.005) * (20 + cos(t * 4) * 10);
      vertex(x, y + warp);
    }
    endShape();
  }

  pop();

  // Reality fold lines - horizontal tears
  if (random() < 0.08) {
    let tearY = random(50, height - 50);
    foldLines.push({
      y: tearY,
      offset: 0,
      targetOffset: random(-80, 80),
      life: 50,
      maxLife: 50,
      color: random(360),
      height: random(5, 25)
    });
  }

  // Dimensional stacking layers
  for (let i = 0; i < 4; i++) {
    let layerAlpha = 8 + sin(t + i * 1.5) * 5;
    let offsetX = sin(t * 0.7 + i * 2) * 30;
    let offsetY = cos(t * 0.5 + i * 3) * 20;
    let scaleVal = 0.85 + i * 0.05;

    push();
    translate(width / 2 + offsetX, height / 2 + offsetY);

    // Rotated overlapping geometric frames
    noFill();
    let hue = (i * 90 + frameCount * 2) % 360;
    stroke(hue, 60, 70, layerAlpha);
    strokeWeight(1);

    rotate(t * 0.3 * (i % 2 === 0 ? 1 : -1));
    let s = 200 + i * 60;
    rect(-s * scaleVal / 2, -s * scaleVal / 2, s * scaleVal, s * scaleVal);
    rect(-s * scaleVal / 2 + 20, -s * scaleVal / 2 + 20, s * scaleVal - 40, s * scaleVal - 40);
    pop();
  }

  // Draw fold lines with shifted reality strips
  for (let i = foldLines.length - 1; i >= 0; i--) {
    let f = foldLines[i];
    f.life--;
    f.offset = lerp(f.offset, f.targetOffset, 0.1);

    if (f.life <= 0) {
      foldLines.splice(i, 1);
      continue;
    }

    let alpha = map(f.life, 0, f.maxLife, 0, 80);

    // The torn strip
    noStroke();
    // Inverted color strip
    fill((f.color + 180) % 360, 70, 60, alpha * 0.4);
    rect(f.offset, f.y - f.height / 2, width, f.height);

    // Harsh white tear line
    stroke(0, 0, 100, alpha);
    strokeWeight(2);
    line(0, f.y, width, f.y);
    line(0, f.y + f.height, width, f.y + f.height);

    // Folded duplicate offset
    stroke(f.color, 60, 80, alpha * 0.3);
    strokeWeight(1);
    line(0, f.y + f.offset, width, f.y + f.offset);
  }

  // Non-euclidean impossible shapes
  if (random() < 0.05) {
    shardQueue.push({
      x: random(100, 700),
      y: random(100, 700),
      size: random(30, 100),
      rotation: random(TWO_PI),
      rotSpeed: random(-0.05, 0.05),
      hue: random(360),
      life: 80,
      type: floor(random(3))
    });
  }

  for (let i = shardQueue.length - 1; i >= 0; i--) {
    let s = shardQueue[i];
    s.life--;
    s.rotation += s.rotSpeed;

    if (s.life <= 0) {
      shardQueue.splice(i, 1);
      continue;
    }

    let alpha = map(s.life, 0, 80, 0, 50);

    push();
    translate(s.x, s.y);
    rotate(s.rotation);
    noFill();
    stroke(s.hue, 80, 90, alpha);
    strokeWeight(1.5);

    if (s.type === 0) {
      // Penrose triangle approximation
      beginShape();
      vertex(-s.size / 2, -s.size / 3);
      vertex(s.size / 2, -s.size / 3);
      vertex(0, s.size / 2);
      endShape(CLOSE);
      // Overlap conflict
      stroke((s.hue + 180) % 360, 80, 90, alpha * 0.7);
      beginShape();
      vertex(-s.size / 2 + 5, -s.size / 3 + 5);
      vertex(s.size / 2 + 5, -s.size / 3 + 5);
      vertex(5, s.size / 2 + 5);
      endShape(CLOSE);
    } else if (s.type === 1) {
      // Impossible cube
      rect(-s.size / 2, -s.size / 2, s.size, s.size);
      push();
      translate(s.size * 0.15, -s.size * 0.15);
      rotate(0.1);
      rect(-s.size / 2, -s.size / 2, s.size, s.size);
      pop();
    } else {
      // Moebius-like twist
      beginShape();
      for (let a = 0; a < TWO_PI; a += 0.1) {
        let r1 = s.size / 2 + sin(a * 2) * s.size / 4;
        let r2 = s.size / 2 + cos(a * 2 + t) * s.size / 4;
        vertex(cos(a) * r1, sin(a) * r2);
      }
      endShape(CLOSE);
    }

    pop();
  }

  // Aggressive color inversion blocks
  if (random() < 0.04) {
    noStroke();
    let invHue = random(360);
    fill(invHue, 100, 100, random(15, 35));
    let bx = random(width);
    let by = random(height);
    rect(bx, by, random(50, 250), random(20, 100));
  }

  // Perspective shift glitch - horizontal slice displacement
  if (random() < 0.06) {
    let sliceY = random(height);
    let sliceH = random(3, 15);
    let shiftX = random(-50, 50);
    noStroke();
    fill(random(360), 50, 50, 20);
    rect(shiftX, sliceY, width, sliceH);
    // Ghost
    fill(0, 0, 100, 10);
    rect(shiftX + 5, sliceY + 2, width, sliceH - 2);
  }

  // Border pulse
  noFill();
  let borderAlpha = 15 + sin(t * 7) * 12;
  stroke(0, 0, 100, borderAlpha);
  strokeWeight(2);
  rect(3, 3, width - 6, height - 6);

  // Second border offset
  stroke(0, 0, 80, borderAlpha * 0.5);
  strokeWeight(1);
  rect(8, 8, width - 16, height - 16);

  // Title (glitched position)
  noStroke();
  fill(0, 0, 100, 25 + sin(t * 8) * 15);
  textSize(12);
  textAlign(LEFT, TOP);
  text("SALVIA — The Doorway", 15 + sin(t * 12) * 4, 15 + cos(t * 9) * 2);
  // Ghost text
  fill(0, 0, 60, 10);
  text("SALVIA — The Doorway", 17 + sin(t * 12) * 4, 17 + cos(t * 9) * 2);
}

function keyPressed() {
  if (key === 's' || key === 'S') saveCanvas('salvia-visual-fingerprint', 'png');
}
</script>
</body>
</html>
