<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>LSD - The Technician</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <style>body{margin:0;overflow:hidden;background:#0a0a12;display:flex;justify-content:center;align-items:center;height:100vh;}</style>
</head>
<body>
<script>
function setup() {
  createCanvas(800, 800);
  colorMode(HSB, 360, 100, 100, 100);
}

function draw() {
  background(240, 80, 5);
  translate(width / 2, height / 2);

  let t = frameCount * 0.008;
  let layers = 12;

  for (let layer = layers; layer >= 0; layer--) {
    let segments = 6 + layer * 2;
    let baseRadius = layer * 28 + sin(t * 2 + layer * 0.5) * 10;
    let hueBase = (t * 20 + layer * 30) % 360;

    for (let i = 0; i < segments; i++) {
      let angle = (TWO_PI / segments) * i + t * (layer % 2 === 0 ? 0.3 : -0.3);

      push();
      rotate(angle);

      // Recursive fractal branches
      drawFractalBranch(baseRadius, 0, layer, hueBase, t, 4);

      // Kaleidoscopic mirrored
      scale(-1, 1);
      drawFractalBranch(baseRadius, 0, layer, hueBase, t, 4);

      pop();
    }
  }

  // Central mandala
  noFill();
  for (let r = 10; r < 120; r += 8) {
    let hue = (t * 40 + r * 2) % 360;
    stroke(hue, 90, 95, map(r, 10, 120, 60, 5));
    strokeWeight(1);
    let wobble = sin(t * 3 + r * 0.1) * 5;
    beginShape();
    for (let a = 0; a <= TWO_PI; a += 0.05) {
      let rad = r + wobble * sin(a * 6 + t * 2);
      vertex(cos(a) * rad, sin(a) * rad);
    }
    endShape(CLOSE);
  }

  // Title
  resetMatrix();
  noStroke();
  fill(180, 80, 100, 50);
  textSize(12);
  textAlign(LEFT, TOP);
  text("LSD — The Technician", 15, 15);
}

function drawFractalBranch(x, y, depth, hueBase, t, maxDepth) {
  if (depth > maxDepth || x > 400) return;

  let len = map(depth, 0, maxDepth, 40, 8) + sin(t * 3 + x * 0.01) * 5;
  let angle = sin(t + depth * 0.7 + x * 0.02) * 0.3;

  let hue = (hueBase + depth * 40) % 360;
  let sat = 80 + depth * 5;
  let bright = 95 - depth * 8;
  let alpha = 70 - depth * 12;

  stroke(hue, sat, bright, alpha);
  strokeWeight(map(depth, 0, maxDepth, 2, 0.5));

  let x2 = x + len;
  let y2 = y + sin(angle) * len * 0.5;

  line(x, y, x2, y2);

  // Geometric node at joint
  noStroke();
  fill(hue, sat, bright, alpha * 0.6);
  let nodeSize = map(depth, 0, maxDepth, 5, 1.5);
  if (depth % 2 === 0) {
    rectMode(CENTER);
    push();
    translate(x2, y2);
    rotate(t * 2 + depth);
    rect(0, 0, nodeSize * 2, nodeSize * 2);
    pop();
  } else {
    ellipse(x2, y2, nodeSize * 2, nodeSize * 2);
  }

  // Recurse
  push();
  translate(x2, y2);
  rotate(angle + 0.4);
  drawFractalBranch(0, 0, depth + 1, hueBase, t, maxDepth);
  rotate(-0.8);
  drawFractalBranch(0, 0, depth + 1, hueBase, t, maxDepth);
  pop();
}

function keyPressed() {
  if (key === 's' || key === 'S') saveCanvas('lsd-visual-fingerprint', 'png');
}
</script>
</body>
</html>
