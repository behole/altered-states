<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>DMT - The Rocket</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <style>body{margin:0;overflow:hidden;background:#000;display:flex;justify-content:center;align-items:center;height:100vh;}</style>
</head>
<body>
<script>
let tunnelOffset = 0;
let entities = [];
let geometryPhase = 0;

function setup() {
  createCanvas(800, 800);
  colorMode(HSB, 360, 100, 100, 100);
  for (let i = 0; i < 5; i++) {
    spawnEntity();
  }
}

function spawnEntity() {
  entities.push({
    x: random(width),
    y: random(height),
    angle: random(TWO_PI),
    size: random(20, 60),
    hue: random(360),
    life: 255,
    form: floor(random(3)),
    speed: random(0.02, 0.08),
    rotSpeed: random(-0.05, 0.05)
  });
}

function draw() {
  // Rapid fade for strobing effect
  background(0, 0, 2, 30);
  tunnelOffset += 8;
  geometryPhase += 0.05;

  let t = frameCount * 0.02;
  let cx = width / 2;
  let cy = height / 2;

  // HYPERSPACE TUNNEL
  push();
  translate(cx, cy);
  for (let i = 0; i < 30; i++) {
    let z = (i * 40 + tunnelOffset) % 1200;
    let perspective = map(z, 0, 1200, 0.1, 3);
    let radius = z * perspective * 0.4;
    let hue = (z * 0.5 + frameCount * 3) % 360;
    let alpha = map(z, 0, 1200, 80, 5);
    noFill();
    stroke(hue, 100, 100, alpha);
    strokeWeight(1.5);
    // Wobbling tunnel rings
    beginShape();
    for (let a = 0; a <= TWO_PI; a += 0.1) {
      let wobble = sin(a * 5 + t * 4 + i * 0.3) * 15 * perspective;
      let r = radius + wobble;
      vertex(cos(a) * r, sin(a) * r);
    }
    endShape(CLOSE);
  }
  pop();

  // RADIAL BURST LINES
  push();
  translate(cx, cy);
  for (let i = 0; i < 36; i++) {
    let angle = (TWO_PI / 36) * i + t * 2;
    let hue = (i * 10 + frameCount * 5) % 360;
    stroke(hue, 100, 100, 15 + sin(t * 6 + i) * 10);
    strokeWeight(1);
    let len = random(200, 450);
    line(0, 0, cos(angle) * len, sin(angle) * len);
  }
  pop();

  // EXPLOSIVE FRACTAL CHOKER
  push();
  translate(cx, cy);
  noFill();
  for (let layer = 0; layer < 4; layer++) {
    let baseR = 80 + layer * 70 + sin(t * 3 + layer) * 30;
    let sides = 5 + layer * 2;
    for (let sub = 0; sub < 3; sub++) {
      let hue = (frameCount * 4 + layer * 60 + sub * 120) % 360;
      stroke(hue, 100, 100, 25 - layer * 5);
      strokeWeight(1);
      beginShape();
      for (let i = 0; i <= sides; i++) {
        let a = (TWO_PI / sides) * i + t * (layer % 2 === 0 ? 1 : -1) + sub * 0.3;
        let r = baseR + sin(a * 3 + t * 5) * 30;
        vertex(cos(a) * r, sin(a) * r);
      }
      endShape(CLOSE);
    }
  }
  pop();

  // ENTITY-LIKE FORMS
  for (let i = entities.length - 1; i >= 0; i--) {
    let e = entities[i];
    e.angle += e.rotSpeed;
    e.life -= 1.5;
    if (e.life <= 0) {
      entities.splice(i, 1);
      spawnEntity();
      continue;
    }

    push();
    translate(e.x, e.y);
    rotate(e.angle);
    let alpha = map(e.life, 0, 255, 0, 60);
    noFill();
    stroke(e.hue, 90, 100, alpha);
    strokeWeight(1.5);

    if (e.form === 0) {
      // Eye-like form
      ellipse(0, 0, e.size, e.size * 1.5);
      ellipse(0, 0, e.size * 0.5, e.size * 0.5);
      line(-e.size / 2, 0, e.size / 2, 0);
    } else if (e.form === 1) {
      // Spinning geometry
      for (let j = 0; j < 5; j++) {
        let a = (TWO_PI / 5) * j + frameCount * 0.03;
        line(0, 0, cos(a) * e.size, sin(a) * e.size);
      }
    } else {
      // Coil form
      beginShape();
      for (let a = 0; a < TWO_PI * 3; a += 0.1) {
        let r = map(a, 0, TWO_PI * 3, 5, e.size);
        vertex(cos(a) * r, sin(a) * r);
      }
      endShape();
    }
    pop();
  }

  // INTENSE STROBE FLASH
  if (random() < 0.04) {
    noStroke();
    fill(random(360), 60, 100, random(10, 30));
    rect(0, 0, width, height);
  }

  // Title
  noStroke();
  fill(0, 0, 100, 30 + sin(t * 8) * 20);
  textSize(12);
  textAlign(LEFT, TOP);
  text("DMT — The Rocket", 15, 15);
}

function keyPressed() {
  if (key === 's' || key === 'S') saveCanvas('dmt-visual-fingerprint', 'png');
}
</script>
</body>
</html>
