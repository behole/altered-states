<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Mescaline - The Elder</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <style>body{margin:0;overflow:hidden;background:#1a0f08;display:flex;justify-content:center;align-items:center;height:100vh;}</style>
</head>
<body>
<script>
let mandalaGrowth = 0;

function setup() {
  createCanvas(800, 800);
  colorMode(HSB, 360, 100, 100, 100);
}

function draw() {
  // Warm dark background
  background(25, 50, 6);

  mandalaGrowth = min(mandalaGrowth + 0.3, 380);
  let t = frameCount * 0.003;
  let cx = width / 2;
  let cy = height / 2;

  // Desert sunset gradient
  noStroke();
  for (let r = 400; r > 0; r -= 5) {
    let h = map(r, 0, 400, 20, 0);
    fill(h, 50, 12, 3);
    ellipse(cx, cy, r * 2, r * 2);
  }

  // Ornamental mandala - slow patient growth
  push();
  translate(cx, cy);

  let maxR = mandalaGrowth;

  // Outer cactus-like geometry
  let numPetals = 12;
  for (let i = 0; i < numPetals; i++) {
    let angle = (TWO_PI / numPetals) * i + t * 0.5;
    let petalLen = maxR * 0.9;

    push();
    rotate(angle);

    // Petal shape - cactus rib inspired
    noFill();
    let hue = (i * 30 + 180) % 360; // Turquoise dominant
    if (i % 3 === 0) hue = 15; // Terracotta accent
    if (i % 4 === 0) hue = 30; // Desert gold

    stroke(hue, 75, 75, 50);
    strokeWeight(1.5);

    // Curved petal
    beginShape();
    for (let p = 0; p <= 1; p += 0.02) {
      let r = p * petalLen;
      let wobble = sin(p * 8 + t * 2) * 8 * p;
      vertex(r, wobble);
    }
    endShape();

    // Mirror
    beginShape();
    for (let p = 0; p <= 1; p += 0.02) {
      let r = p * petalLen;
      let wobble = -sin(p * 8 + t * 2) * 8 * p;
      vertex(r, wobble);
    }
    endShape();

    // Decorative dots along petal
    noStroke();
    for (let d = 30; d < petalLen - 10; d += 25) {
      let dotAlpha = map(d, 30, petalLen, 60, 20);
      fill(hue, 80, 85, dotAlpha);
      let wobble = sin(d * 0.08 + t * 2) * 8 * (d / petalLen);
      ellipse(d, wobble, 4, 4);
      ellipse(d, -wobble, 4, 4);
    }

    pop();
  }

  // Inner concentric mandala rings
  for (let ring = 1; ring <= 5; ring++) {
    let r = ring * 45;
    if (r > maxR * 0.5) break;

    let sides = 6 + ring * 2;
    let hue = [180, 15, 45, 180, 15][ring - 1];

    noFill();
    stroke(hue, 70, 80, 40);
    strokeWeight(1.2);

    beginShape();
    for (let i = 0; i <= sides; i++) {
      let a = (TWO_PI / sides) * i + t * (ring % 2 === 0 ? 0.3 : -0.3);
      let wobble = sin(a * 3 + t * 1.5) * 5;
      vertex(cos(a) * (r + wobble), sin(a) * (r + wobble));
    }
    endShape(CLOSE);

    // Inner detail ring
    stroke(hue, 50, 90, 20);
    strokeWeight(0.5);
    ellipse(0, 0, r * 1.8, r * 1.8);
  }

  // Central ornament
  noStroke();
  for (let r = 30; r > 0; r -= 3) {
    let hue = map(r, 0, 30, 45, 15);
    fill(hue, 80, 90, map(r, 0, 30, 80, 10));
    ellipse(0, 0, r * 2, r * 2);
  }

  pop();

  // Cactus-like vertical accents in corners
  for (let corner = 0; corner < 4; corner++) {
    push();
    let ox = corner % 2 === 0 ? 60 : width - 60;
    let oy = corner < 2 ? 100 : height - 100;
    translate(ox, oy);
    stroke(130, 40, 30, 25);
    strokeWeight(2);
    noFill();
    for (let rib = -2; rib <= 2; rib++) {
      beginShape();
      for (let y = -60; y <= 60; y += 5) {
        let x = rib * 8 + sin(y * 0.05 + t) * 3;
        vertex(x, y);
      }
      endShape();
    }
    pop();
  }

  // Title
  noStroke();
  fill(45, 50, 80, 40);
  textSize(12);
  textAlign(LEFT, TOP);
  text("MESCALINE — The Elder", 15, 15);
}

function keyPressed() {
  if (key === 's' || key === 'S') saveCanvas('mescaline-visual-fingerprint', 'png');
}
</script>
</body>
</html>
